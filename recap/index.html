<html lang="en">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <head>
    <title>The itswill Recap</title>
    <link rel="icon" href="../resources/favicon.ico">
  </head>
  <body>
    <div class="content">
      <div class="section-wrap" id="lookup-form-wrap">
        <div class="section" id="lookup-form">
          <form class="recap-form" action="">
            <span class="entry-label" id="username-entry-label">Username:</span>
            <input type="text" onClick="this.select();" class="entry-text" name="username" id="username-entry-text">
            <input type="submit" class="form-button" id="lookup-submit" value="Find user">
          </form>
        </div>
      </div>
      <div class="section-wrap" id="stats-wrap">
        <div class="section" id="stats">
          <div class="section-title" id="stat-title"></div>
          <div class="stat-item" id="msg-count">
            <span class="stat-label" id="msg-count-label">Messages sent:</span>
            <span class="stat-value" id="msg-count-value"></span>
          </div>
          <div class="stat-item" id="clip-count">
            <span class="stat-label" id="clip-count-label">Clips created:</span>
            <span class="stat-value" id="clip-count-value"></span>
          </div>
          <div class="stat-item" id="clip-views">
            <span class="stat-label" id="clip-views-label">Views on those clips:</span>
            <span class="stat-value" id="clip-views-value"></span>
          </div>
          <div class="stat-item" id="first-msg">
            <span class="stat-label" id="first-msg-label">First message this year:</span>
            <div class="stat-value" id="first-msg-value"></div>
          </div>
          <div class="stat-item" id="itswill7">
            <span class="stat-label" id="itswill7-label">

              <img class="emote-img" id="itswillFreeTrial-img" src="./resources/emotes/itswillFreeTrial.png" title="itswillFreeTrial">

            <span class="stat-value" id="itswill7-value"></span>
          </div>
          <div class="stat-item" id="itswillPound">

          <div class="stat-item" id="stsmg">
